<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERLCX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#050b14;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 30px;
background:#0b111c;
}

.logo{
font-weight:700;
font-size:22px;
letter-spacing:1px;
}

.logo span{
color:#3aa3ff;
}

.search{
flex:1;
margin:0 40px;
}

.search input{
width:100%;
padding:10px 16px;
border-radius:20px;
border:none;
background:#141c2a;
color:white;
}

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

.create-btn{
background:#3aa3ff;
border:none;
padding:10px 16px;
border-radius:20px;
color:white;
cursor:pointer;
}

.profile{
background:#141c2a;
padding:8px 14px;
border-radius:20px;
}

/* HERO */

.hero{
height:320px;
background:url("https://picsum.photos/1600/800") center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
}

.hero-content{
position:relative;
text-align:center;
}

.hero button{
margin-top:15px;
padding:12px 20px;
border:none;
background:#3aa3ff;
color:white;
border-radius:25px;
cursor:pointer;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:20px;
margin-top:-40px;
position:relative;
z-index:2;
}

.stat{
background:rgba(40,40,50,0.8);
backdrop-filter:blur(6px);
padding:18px 30px;
border-radius:15px;
min-width:180px;
}

.stat h3{
font-size:14px;
color:#9aa6bd;
margin-bottom:5px;
}

.stat p{
font-size:22px;
font-weight:700;
}

/* MAIN CONTENT */

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
padding:50px;
}

.section-title{
font-size:24px;
margin-bottom:6px;
}

.section-sub{
color:#8c96aa;
margin-bottom:20px;
font-size:14px;
}

/* ASSETS GRID */

.assets{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.asset{
background:#0f1624;
border-radius:14px;
overflow:hidden;
}

.asset img{
width:100%;
display:block;
}

.asset p{
padding:10px;
}

/* TRENDING */

.trending-item{
display:flex;
gap:12px;
background:#0f1624;
padding:10px;
border-radius:10px;
margin-bottom:10px;
align-items:center;
}

.trending-item img{
width:60px;
height:40px;
object-fit:cover;
border-radius:6px;
}

.trending-text{
font-size:14px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">ERLC<span>X</span></div>

<div class="search">
<input placeholder="Search creations, users, groups...">
</div>

<div class="nav-right">
<button class="create-btn">+ Create New</button>
<div class="profile">HeyItBob36</div>
</div>

</div>

<!-- HERO -->

<div class="hero">

<div class="hero-content">
<h1>Discovery, designer tools, and more</h1>
<button>Explore Marketplace</button>
</div>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat">
<h3>UPLOADS</h3>
<p>1.7K</p>
</div>

<div class="stat">
<h3>CREATORS</h3>
<p>568</p>
</div>

<div class="stat">
<h3>FAVORITES</h3>
<p>9.3K</p>
</div>

<div class="stat">
<h3>MEMBERS</h3>
<p>6.0K</p>
</div>

</div>

<!-- MAIN -->

<div class="main">

<div>

<div class="section-title">Featured Assets</div>
<div class="section-sub">Most popular assets on the platform</div>

<div class="assets">

<div class="asset">
<img src="https://picsum.photos/400/200">
<p>Liberty County Sheriff Pack</p>
</div>

<div class="asset">
<img src="https://picsum.photos/401/200">
<p>Moderator UI Pack</p>
</div>

</div>

</div>

<div>

<div class="section-title">Trending Now</div>
<div class="section-sub">What's hot this week</div>

<div class="trending-item">
<img src="https://picsum.photos/100/60">
<div class="trending-text">
Family Jewels Livery
</div>
</div>

<div class="trending-item">
<img src="https://picsum.photos/101/60">
<div class="trending-text">
Titan Towing & Recovery
</div>
</div>

</div>

</div>

</body>
</html>
